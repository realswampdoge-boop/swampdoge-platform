<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SwampDoge</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>

body{
background:#041b12;
color:#8affc1;
font-family:Arial;
text-align:center;
}

button{
background:#0c3;
border:none;
padding:12px 20px;
margin:6px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.card{
border:1px solid #0f6;
padding:20px;
margin:20px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🐊 SwampDoge</h1>

<button id="connectBtn">Connect Wallet</button>

<p id="walletText">Not connected</p>
<p id="balanceText">SWAMP: 0</p>

<div class="card">
<h2>AI Picks</h2>
<p>AI picks loading...</p>
</div>

<div class="card">
<h2>Swamp Rewards</h2>
<button id="claimDailyBtn">Claim Daily</button>
</div>

<div class="card">
<h2>Admin Panel</h2>

<input id="payoutWallet" placeholder="wallet address">

<br><br>

<input id="payoutAmount" placeholder="amount">

<br><br>

<button id="testPayoutBtn">Test 1 SWAMP</button>

<button id="sendPayoutBtn">Send Payout</button>

<p id="payoutStatus">Payout idle</p>

</div>

<script>

let connection =
new solanaWeb3.Connection(
"https://api.mainnet-beta.solana.com"
);

let provider = null;

let walletAddress = "";

const SWAMP_MINT =
"GXnNG5q32mmcpVmNAKKUf1WTSqNxoVKJyho6jQT4pump";

const connectBtn =
document.getElementById("connectBtn");

const walletText =
document.getElementById("walletText");

const balanceText =
document.getElementById("balanceText");

connectBtn.onclick = async () => {

if(!window.solana){
alert("Install Phantom");
return;
}

provider = window.solana;

const resp =
await provider.connect();

walletAddress =
resp.publicKey.toString();

window.currentWallet =
walletAddress;

walletText.textContent =
walletAddress;

loadBalance();

};

async function loadBalance(){

try{

const owner =
new solanaWeb3.PublicKey(walletAddress);

const mint =
new solanaWeb3.PublicKey(SWAMP_MINT);

const resp =
await connection.getParsedTokenAccountsByOwner(
owner,
{ mint }
);

let total = 0;

resp.value.forEach(item=>{
total += Number(
item.account.data.parsed.info.tokenAmount.uiAmount
);
});

balanceText.textContent =
"SWAMP: "+total;

}catch(e){
console.log(e);
}

}

async function sendTokenPayout(wallet,amount){

try{

const tx =
new solanaWeb3.Transaction();

console.log("Send payout",wallet,amount);

return "mockSignature";

}catch(e){

console.log(e);
throw e;

}

}

const payoutStatus =
document.getElementById("payoutStatus");

const testBtn =
document.getElementById("testPayoutBtn");

const sendBtn =
document.getElementById("sendPayoutBtn");

testBtn.onclick = async ()=>{

const wallet =
window.currentWallet;

if(!wallet){
alert("connect wallet");
return;
}

payoutStatus.textContent =
"Testing payout...";

try{

const sig =
await sendTokenPayout(wallet,1);

payoutStatus.textContent =
"Test payout sent ✅";

}catch(e){

payoutStatus.textContent =
"Test payout failed ❌";

}

};

sendBtn.onclick = async ()=>{

const wallet =
document.getElementById("payoutWallet").value;

const amount =
document.getElementById("payoutAmount").value;

if(!wallet || !amount){
alert("enter wallet and amount");
return;
}

payoutStatus.textContent =
"Sending payout...";

try{

const sig =
await sendTokenPayout(wallet,amount);

payoutStatus.textContent =
"Payout sent ✅";

}catch(e){

payoutStatus.textContent =
"Payout failed ❌";

}

};

</script>

</body>
</html>
