<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwampDoge</title>
<style>
body{
  font-family:Arial;
  background:#0b2c3c;
  color:white;
  text-align:center;
  padding:20px;
}
.btn{
  width:90%;
  padding:18px;
  margin:12px auto;
  font-size:20px;
  border-radius:14px;
  border:none;
  background:#2d3f77;
  color:#fff;
}
.card{
  background:#243a6b;
  padding:20px;
  border-radius:14px;
  margin-top:20px;
}
.small{margin:6px;}
</style>
</head>
<body>
<h1>SwampDoge</h1>
<div>Wallet Test (Reset)</div>
  <button id="connectBtn" class="btn">Connect Phantom</button>
<button id="disconnectBtn" class="btn">Disconnect</button>
<div class="card">
<div>Status: <span id="status">...</span></div>
<div>Wallet: <span id="wallet">...</span></div>
  <div>Swamp Balance: <span id="swampBal">...</span></div>
<div>VIP: <span id="vipStatus">Locked</span></div>
<div>Debug: <span id="debug">READY</span></div>
</div>
  <!-- ✅ VIP PICKS -->
<div class="card" style="margin-top:16px;">
  <div style="font-weight:800; font-size:26px;">🔒 VIP Picks</div>

  <div id="vipLockedMsg" style="margin-top:10px; opacity:.9;">
    Hold <b>$SWAMP</b> to unlock VIP picks.
  </div>

  <div id="vipPicksBox" style="display:none; margin-top:12px; text-align:left;">
    <div style="font-weight:700;">Today’s VIP Picks</div>
    <ul style="margin-top:10px; line-height:1.6;">
      <li>VIP Pick #1: (coming next)</li>
      <li>VIP Pick #2: (coming next)</li>
      <li>VIP Pick #3: (coming next)</li>
    </ul>
  </div>
</div>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script>
const debug = m=>document.getElementById("debug").textContent=m;
const SWAMP_MINT = "GXnNG5q32mmcpVmNAKKUf1WTSqNxoVKJyho6jQT4pump";
const VIP_MIN = 10_000_000; // change if you want

const connection = new solanaWeb3.Connection(
  "https://rpc.ankr.com/solana",
  "confirmed"
);
  
async function getSwampBalance(walletAddress) {
  try {
    debug("SWAMP CHECK…");
    debug("Checking SWAMP…");

    const r = await fetch(`/api/swamp-balance?wallet=${encodeURIComponent(walletAddress)}`);
    const j = await r.json();
    debug("API RESPONSE: " + JSON.stringify(j));
    
    if (!j.ok) {
      debug("SWAMP API ERROR ❌");
      return 0;
    }

    debug("SWAMP READY ✅");
    return Number(j.uiAmount || 0);
  } catch (e) {
    console.log(e);
    debug("SWAMP ERROR ❌");
    return 0;
  }
}


function setVip(isVip) {
  document.getElementById("vipStatus").textContent = isVip ? "UNLOCKED ✅" : "Locked 🔒";

  const vipPicksBox = document.getElementById("vipPicksBox");
  const vipLockedMsg = document.getElementById("vipLockedMsg");

  if (vipPicksBox && vipLockedMsg) {
    vipPicksBox.style.display = isVip ? "block" : "none";
    vipLockedMsg.style.display = isVip ? "none" : "block";
  }
}
document.getElementById("connectBtn").onclick = async () => {
  try {
    debug("CONNECT TAP…");

    if (window.solana && window.solana.isPhantom) {
      const r = await window.solana.connect();
      const walletAddr = r.publicKey.toString();

      document.getElementById("wallet").textContent = walletAddr;
      document.getElementById("status").textContent = "Connected";
      debug("CONNECTED ✅");

      const bal = await getSwampBalance(walletAddr);
      document.getElementById("swampBal").textContent = bal.toLocaleString();

      setVip(bal >= VIP_MIN);
      debug("SWAMP READY ✅");
    } else {
      alert("Phantom not found");
      debug("NO PHANTOM ❌");
    }
  } catch (e) {
    console.log(e);
    debug("CONNECT ERROR ❌ " + (e?.message || e));
  }
};

document.getElementById("disconnectBtn").onclick=async()=>{
  if(window.solana) await window.solana.disconnect();
  document.getElementById("wallet").textContent="";
  document.getElementById("status").textContent="Disconnected";
  debug("DISCONNECTED");
};
</script>
</body>
</html>
:::
