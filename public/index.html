<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SwampDoge</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial; background:#071b2a; color:#e8f0ff; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 18px; }
    .card { background:#0b2a44; border-radius: 18px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    h1 { margin: 0 0 8px 0; font-size: 44px; letter-spacing: .5px; }
    h2 { margin: 18px 0 10px 0; font-size: 34px; }
    .btn { width: 100%; padding: 16px; border-radius: 16px; border: 0; background:#1a2f5f; color:#fff; font-size: 22px; margin: 10px 0; }
    .btn:active { transform: scale(.99); }
    .small { opacity:.85; font-size: 16px; margin: 10px 0; }
    hr { border:0; height:1px; background: rgba(255,255,255,.18); margin: 16px 0; }
    ul { margin: 0; padding-left: 18px; }
    li { margin: 10px 0; }
    .muted { opacity:.75; }
    .barWrap { width:100%; background:#102a3f; border-radius: 10px; overflow:hidden; height: 14px; }
    .bar { height:14px; width:0%; background: linear-gradient(90deg,#31e0a1,#4aa3ff); transition: width .4s ease; }
    .vipLocked { padding: 14px; background:#0a2336; border-radius: 14px; }
    .admin { display:none; margin-top: 14px; padding: 14px; background:#0a2336; border-radius: 14px; }
    input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.15); background:#071b2a; color:#fff; font-size: 16px; }
    textarea { min-height: 120px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>SwampDoge</h1>
      <div class="small muted">Wallet Test (v1 • one-file)</div>

      <button id="btnConnect" class="btn" type="button">Connect Phantom</button>
      <button id="btnDisconnect" class="btn" type="button">Disconnect</button>

      <div class="small">Status: <span id="statusText"></span></div>
      <div class="small">Wallet: <span id="walletText"></span></div>
      <div class="small">Swampdoge Balance: <span id="swampBal">...</span></div>
      <div class="small">Debug: <span id="debugText">...</span></div>

      <hr>

      <h2>🔥 Free Picks</h2>
<section id="aiPicksSection">
  <h3 style="margin:10px 0; font-size: 26px;">🤖 AI Picks</h3>
  <div id="aiPicksMeta" class="small muted">Loading AI picks...</div>
  <ul id="aiPicksList"></ul>
</section>

<hr>
      

      <hr>

      <h3 style="margin:10px 0; font-size: 26px;">🔒 VIP Picks</h3>

      <div class="barWrap"><div id="vipProgressBar" class="bar"></div></div>
      <div id="vipProgressText" class="small muted">Progress loading...</div>

      <div id="vipLocked" class="vipLocked">
        <div class="small">Hold <b>$SWAMP</b> to unlock VIP picks</div>
      </div>

      <div id="vipContent" style="display:none;">
        <div class="small"><b>VIP Picks Unlocked 🐊</b></div>
        <ul id="vipPicksList"></ul>
      </div>

      <button id="btnAdminToggle" class="btn" type="button" style="margin-top:14px;">Admin</button>

      <div id="adminPanel" class="admin">
        <div class="small muted">Update VIP picks (one per line) then Publish.</div>
        <input id="adminPin" type="password" placeholder="Admin PIN" />
        <div style="height:10px"></div>
        <textarea id="adminPicks" placeholder="Example:
Lakers ML
Celtics -3
Over 220.5"></textarea>
        <button id="btnPublish" class="btn" type="button">Publish VIP Picks 🚀</button>
        <div id="adminStatus" class="small muted"></div>
      </div>

    </div>
  </div>

  <!-- Solana web3 -->
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <script>
    /***********************
     * CONFIG (EDIT THESE)
     ***********************/
    const SWAMP_MINT = "GXnNG5q32mmcpVmNAKKUf1WTSqNxoVKJyho6jQT4pump"; // ✅ your token mint
    const VIP_MIN = 1000000; // 1,000,000
    const RPC_URL = "https://api.mainnet-beta.solana.com";
    const RPC_COMMITMENT = "confirmed";

    // Admin PIN (client-side only; not secure, but ok for prototype)
    const ADMIN_PIN = "7777";

    /***********************
     * DOM
     ***********************/
    const $ = (id) => document.getElementById(id);
    const statusText = $("statusText");
    const walletText = $("walletText");
    const swampBal = $("swampBal");
    const debugText = $("debugText");

    const vipLocked = $("vipLocked");
    const vipContent = $("vipContent");
    const vipPicksList = $("vipPicksList");
    const vipProgressBar = $("vipProgressBar");
    const vipProgressText = $("vipProgressText");

    const aiPicksMeta = $("aiPicksMeta");
    const aiPicksList = $("aiPicksList");

    const btnConnect = $("btnConnect");
    const btnDisconnect = $("btnDisconnect");
    const btnAdminToggle = $("btnAdminToggle");
    const adminPanel = $("adminPanel");
    const adminPin = $("adminPin");
    const adminPicks = $("adminPicks");
    const btnPublish = $("btnPublish");
    const adminStatus = $("adminStatus");

    /***********************
     * STATE
     ***********************/
    let currentWallet = null;
    let isVIP = false;

    function setStatus(msg){ if(statusText) statusText.textContent = msg || ""; }
    function setWallet(addr){ if(walletText) walletText.textContent = addr || ""; }
    function setBal(v){ if(swampBal) swampBal.textContent = (v === null || v === undefined) ? "..." : String(v); }
    function setDebug(msg){ if(debugText) debugText.textContent = msg || ""; }

    function showVip(unlocked){
      if(vipLocked) vipLocked.style.display = unlocked ? "none" : "block";
      if(vipContent) vipContent.style.display = unlocked ? "block" : "none";
    }

    function setVipProgress(balance){
      const pct = Math.max(0, Math.min(100, (Number(balance)||0) / VIP_MIN * 100));
      if(vipProgressBar) vipProgressBar.style.width = pct.toFixed(1) + "%";
      if(vipProgressText) vipProgressText.textContent = `Progress: ${Math.floor(balance||0).toLocaleString()} / ${VIP_MIN.toLocaleString()} (${pct.toFixed(1)}%)`;
    }

    /***********************
     * SOLANA
     ***********************/
    function connection(){
      return new solanaWeb3.Connection(RPC_URL, RPC_COMMITMENT);
    }

    function phantomProvider(){
      // Phantom injects window.solana when inside Phantom browser OR desktop extension
      if (window.solana && window.solana.isPhantom) return window.solana;
      return null;
    }

    function openPhantomDeepLink(){
      // Deep link to open THIS PAGE inside Phantom
      const currentUrl = window.location.href;
      const link = "https://phantom.app/ul/browse/" + encodeURIComponent(currentUrl);
      window.location.href = link;
    }

    async function connectWallet(){
      const provider = phantomProvider();
      if (!provider){
        setStatus("Phantom not found ❌");
        setDebug("Open this page inside Phantom browser (deep-linking...)");
        openPhantomDeepLink();
        return null;
      }
      setStatus("Connecting...");
      const resp = await provider.connect();
      const addr = resp?.publicKey?.toString?.() || provider.publicKey?.toString?.();
      if (!addr) throw new Error("No wallet address from Phantom");
      return addr;
    }

    async function disconnectWallet(){
      try{
        const provider = phantomProvider();
        if (provider?.disconnect) await provider.disconnect();
      }catch(e){ /* ignore */ }

      currentWallet = null;
      isVIP = false;
      setStatus("Disconnected");
      setWallet("");
      setBal("...");
      setVipProgress(0);
      showVip(false);
      setDebug("Disconnected");
    }

    async function getSwampBalance(walletAddress){
      // Reads SPL balance for SWAMP_MINT
      const conn = connection();
      const owner = new solanaWeb3.PublicKey(walletAddress);
      const mint = new solanaWeb3.PublicKey(SWAMP_MINT);

      const resp = await conn.getParsedTokenAccountsByOwner(owner, { mint });

      let total = 0;
      for (const item of resp.value){
        const amt = item.account?.data?.parsed?.info?.tokenAmount;
        total += Number(amt?.uiAmountString || amt?.uiAmount || 0);
      }
      return total;
    }

    /***********************
     * PICKS
     ***********************/
    async function loadVipPicks(){
      // expects your existing endpoint
      // should return { picks: ["...","..."], updatedAt?: "..." }
      const res = await fetch("/api/vip-picks", { cache: "no-store" });
      if (!res.ok) throw new Error("vip-picks fetch failed");
      return await res.json();
    }

    async function renderVipPicks(){
      try{
        const data = await loadVipPicks();
        const picks = Array.isArray(data?.picks) ? data.picks : [];
        if (vipPicksList){
          vipPicksList.innerHTML = "";
          picks.forEach(p => {
            const li = document.createElement("li");
            li.textContent = String(p);
            vipPicksList.appendChild(li);
          });
        }
        setDebug(`VIP picks loaded ✅ (${picks.length})`);
      }catch(e){
        console.log(e);
        setDebug("VIP picks load ❌");
      }
    }

    async function loadAiPicks(){
      // expects { picks:[{title,reason,confidence}], updatedAt?:... }
      const res = await fetch("/api/ai-picks", { cache: "no-store" });
      if (!res.ok) throw new Error("ai-picks fetch failed");
      return await res.json();
    }

    async function renderAiPicks(){
      try{
        const data = await loadAiPicks();
        const picks = Array.isArray(data?.picks) ? data.picks : [];
        if (aiPicksMeta) aiPicksMeta.textContent = data?.updatedAt ? `Updated: ${data.updatedAt}` : "Updated";
        if (aiPicksList){
          aiPicksList.innerHTML = "";
          picks.forEach(p => {
            const li = document.createElement("li");
            const title = p?.title ? String(p.title) : String(p);
            const reason = p?.reason ? String(p.reason) : "";
            const conf = (p?.confidence !== undefined) ? `Confidence: ${p.confidence}%` : "";
            li.innerHTML = `<b>${escapeHtml(title)}</b><div class="muted" style="margin-top:6px">${escapeHtml(reason)}</div><div class="muted">${escapeHtml(conf)}</div>`;
            aiPicksList.appendChild(li);
          });
        }
      }catch(e){
        console.log(e);
        if (aiPicksMeta) aiPicksMeta.textContent = "AI picks failed to load ❌";
      }
    }

    function escapeHtml(s){
      return String(s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    /***********************
     * VIP GATING + REFRESH
     ***********************/
    async function refreshVipForWallet(addr){
      try{
        setBal("...");
        setVipProgress(0);
        showVip(false);

        const bal = await getSwampBalance(addr);
        setBal(Math.floor(bal).toLocaleString());
        setVipProgress(bal);

        isVIP = bal >= VIP_MIN;
        showVip(isVIP);

        if (isVIP) await renderVipPicks();
      }catch(e){
        console.log(e);
        setDebug("TOKEN ERROR ❌ (mint or RPC)");
        setBal("0");
        setVipProgress(0);
        showVip(false);
      }
    }

    /***********************
     * ADMIN
     ***********************/
    function toggleAdmin(){
      adminPanel.style.display = (adminPanel.style.display === "block") ? "none" : "block";
    }

    async function publishVipPicks(){
      try{
        adminStatus.textContent = "";
        const pin = adminPin.value || "";
        if (pin !== ADMIN_PIN){
          adminStatus.textContent = "Wrong PIN ❌";
          return;
        }
        const lines = (adminPicks.value || "")
          .split("\n")
          .map(x => x.trim())
          .filter(Boolean);

        const res = await fetch("/api/admin/publish", {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({ picks: lines })
        });

        if (!res.ok) throw new Error("publish failed");
        adminStatus.textContent = "Published ✅";
        await renderVipPicks();
      }catch(e){
        console.log(e);
        adminStatus.textContent = "Publish failed ❌ (missing API route?)";
      }
    }

    /***********************
     * BOOT
     ***********************/
    async function boot(){
      setStatus("Ready");
      setWallet("");
      setBal("...");
      setDebug("Loaded ✅ (one-file)");

      btnConnect.addEventListener("click", async () => {
        try{
          const addr = await connectWallet();
          if (!addr) return;
          currentWallet = addr;
          setStatus("Connected ✅");
          setWallet(addr);
          await refreshVipForWallet(addr);
        }catch(e){
          console.log(e);
          setStatus("Connect failed ❌");
          setDebug(String(e?.message || e));
        }
      });

      btnDisconnect.addEventListener("click", disconnectWallet);
      btnAdminToggle.addEventListener("click", toggleAdmin);
      btnPublish.addEventListener("click", publishVipPicks);

      // Always load AI picks
      await renderAiPicks();
    }

    // Global safety (so you NEVER see “can’t find variable” again)
    window.connectWallet = connectWallet;
    window.disconnectWallet = disconnectWallet;

    window.addEventListener("error", (e) => {
      const msg = "JS ERROR: " + (e?.message || "unknown");
      console.log(msg, e);
      setDebug(msg);
    });

    window.addEventListener("DOMContentLoaded", boot);
  </script>
</body>
</html>
