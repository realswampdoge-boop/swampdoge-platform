<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwampDoge</title>
<style>
body{
  font-family:Arial;
  background:#0b2c3c;
  color:white;
  text-align:center;
  padding:20px;
}
.btn{
  width:90%;
  padding:18px;
  margin:12px auto;
  font-size:20px;
  border-radius:14px;
  border:none;
  background:#2d3f77;
  color:#fff;
}
.card{
  background:#243a6b;
  padding:20px;
  border-radius:14px;
  margin-top:20px;
}
.small{margin:6px;}
</style>
</head>
<body>
<h1>SwampDoge</h1>
<div>Wallet Test (Reset)</div>
  <button id="connectBtn" class="btn">Connect Phantom</button>
<button id="disconnectBtn" class="btn">Disconnect</button>
<div class="card">
<div>Status: <span id="status">...</span></div>
<div>Wallet: <span id="wallet">...</span></div>
  <div>Swamp Balance: <span id="swampBal">...</span></div>
<div>VIP: <span id="vipStatus">Locked</span></div>
<div>Debug: <span id="debug">READY</span></div>
</div>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script>
const debug = m=>document.getElementById("debug").textContent=m;
const SWAMP_MINT = "GXnNG5q32mmcpVmNAKKUf1WTSqNxoVKJyho6jQT4pump";
const VIP_MIN = 1_000_000; // change if you want

const connection = new solanaWeb3.Connection(
  "https://api.mainnet-beta.solana.com",
  "confirmed"
);

async function getSwampBalance(walletAddress) {
  const owner = new solanaWeb3.PublicKey(walletAddress);
  const mint = new solanaWeb3.PublicKey(SWAMP_MINT);

  const resp = await connection.getParsedTokenAccountsByOwner(owner, { mint });

  let total = 0;
  for (const item of resp.value) {
    const amt = item.account.data.parsed.info.tokenAmount;
    total += Number(amt.uiAmountString || amt.uiAmount || 0);
  }
  return total;
}

function setVip(isVip) {
  const el = document.getElementById("vipStatus");
  if (el) el.textContent = isVip ? "UNLOCKED ✅" : "Locked 🔒";
}
document.getElementById("connectBtn").onclick=async()=>{

  debug("CONNECT TAP");

  if(window.solana && window.solana.isPhantom){
      const r=await window.solana.connect();
    const walletAddr = r.publicKey.toString();

debug("Checking SWAMP…");

const bal = await getSwampBalance(walletAddr);

document.getElementById("swampBal").textContent =
  bal.toLocaleString();

setVip(bal >= VIP_MIN);

debug("SWAMP READY ✅");
      document.getElementById("wallet").textContent=r.publicKey.toString();
      document.getElementById("status").textContent="Connected";
      debug("CONNECTED ✅");
      return;
  }

  const url=encodeURIComponent(location.href);
  location.href=`https://phantom.app/ul/browse/${url}`;
};

document.getElementById("disconnectBtn").onclick=async()=>{
  if(window.solana) await window.solana.disconnect();
  document.getElementById("wallet").textContent="";
  document.getElementById("status").textContent="Disconnected";
  debug("DISCONNECTED");
};
</script>
</body>
</html>
:::
