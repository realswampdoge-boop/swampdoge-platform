<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SwampDoge</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Arial; background:#071b2a; color:#e8f0ff; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 18px; }
    .card { background:#0b2a44; border-radius: 18px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    h1 { margin: 0 0 8px 0; font-size: 44px; letter-spacing: .5px; }
    h2 { margin: 18px 0 10px 0; font-size: 34px; }
    .btn { width: 100%; padding: 16px; border-radius: 16px; border: 0; background:#1a2f5f; color:#fff; font-size: 22px; margin: 10px 0; }
    .btn:active { transform: scale(.99); }
    .small { opacity:.85; font-size: 16px; margin: 10px 0; }
    hr { border:0; height:1px; background: rgba(255,255,255,.18); margin: 16px 0; }
    ul { margin: 0; padding-left: 18px; }
    li { margin: 10px 0; }
    .muted { opacity:.75; }
    .barWrap { width:100%; background:#102a3f; border-radius: 10px; overflow:hidden; height: 14px; }
    .bar { height:14px; width:0%; background: linear-gradient(90deg,#31e0a1,#4aa3ff); transition: width .4s ease; }
    .vipLocked { padding: 14px; background:#0a2336; border-radius: 14px; }
    .admin { display:none; margin-top: 14px; padding: 14px; background:#0a2336; border-radius: 14px; }
    input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.15); background:#071b2a; color:#fff; font-size: 16px; }
    textarea { min-height: 120px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>SwampDoge</h1>
      <div class="small muted">Wallet Test (v1 • one-file)</div>

      <button id="btnConnect" class="btn" type="button"
  onclick="window.__tapConnect && window.__tapConnect()"
  ontouchstart="window.__tapConnect && window.__tapConnect()">
  Connect Phantom
</button>
      <button id="btnDisconnect" class="btn" type="button"
onclick="window.__tapDisconnect && window.__tapDisconnect()"
ontouchstart="window.__tapDisconnect && window.__tapDisconnect()">
Disconnect
</button>
       

      <div class="small">Status: <span id="statusText"></span></div>
      <div class="small">Wallet: <span id="walletText"></span></div>
      <div class="small">Swampdoge Balance: <span id="swampBal">...</span></div>
      <div class="small">Debug: <span id="debugText">...</span></div>

      <hr>

      <h2>🔥 Free Picks</h2>


      
<h2>🤖 AI Picks</h2>

<div id="aiPicksMeta" class="small muted">
  Loading AI picks...
</div>

<ul id="aiPicksList"></ul>

<hr>
      

      <hr>

      <h3 style="margin:10px 0; font-size: 26px;">🔒 VIP Picks</h3>

      <div class="barWrap"><div id="vipProgressBar" class="bar"></div></div>
      <div id="vipProgressText" class="small muted">Progress loading...</div>

      <div id="vipLocked" class="vipLocked">
        <div class="small">Hold <b>$SWAMP</b> to unlock VIP picks</div>
      </div>

      <div id="vipContent" style="display:none;">
        <div class="small"><b>VIP Picks Unlocked 🐊</b></div>
        <ul id="vipPicksList"></ul>
      </div>

      <button id="btnAdminToggle" class="btn" type="button"
  onclick="window.__tapAdmin && window.__tapAdmin()"
  ontouchstart="window.__tapAdmin && window.__tapAdmin()">
  Admin
</button>

      <div id="adminPanel" class="admin">
        <div class="small muted">Update VIP picks (one per line) then Publish.</div>
        <input id="adminPin" type="password" placeholder="Admin PIN" />
        <div style="height:10px"></div>
        <textarea id="adminPicks" placeholder="Example:
Lakers ML
Celtics -3
Over 220.5"></textarea>
        <button id="btnPublish" class="btn" type="button"
  onclick="window.__tapPublish && window.__tapPublish()"
  ontouchstart="window.__tapPublish && window.__tapPublish()">
  Publish VIP Picks 🚀
</button>
        <div id="adminStatus" class="small muted"></div>
      </div>

    </div>
  </div>

  <!-- Solana web3 --> 
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script> 
<script src="./swampdoge-all.js?v=100" defer></script>
</body>
</html>
